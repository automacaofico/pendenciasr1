<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Pendências FICO Infra — Encerramento de Obra</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  :root{
    --navy:#142A4C; --navy2:#1E3A63; --laranja:#F89B32; --laranja2:#FFB259; --azul:#3578BC; --azul2:#4A90D9;
    --verde:#2E9B4E; --amarelo:#F4C430; --vermelho:#D14545;
    --cinza-bg:#EEF1F6; --cinza-borda:#E1E6EE; --cinza-txt:#5A6A7E;
    --branco:#FFFFFF; --preto:#1A1A1A;
    --sh-sm:0 2px 6px rgba(20,42,76,.08);
    --sh-md:0 6px 20px rgba(20,42,76,.12);
    --sh-lg:0 14px 40px rgba(20,42,76,.16);
    --sh-navy:0 10px 30px rgba(20,42,76,.35);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(53,120,188,.10), transparent 60%),
      radial-gradient(900px 500px at -5% 20%, rgba(248,155,50,.08), transparent 55%),
      var(--cinza-bg);
    font-family:'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;color:var(--preto);
    font-size:14px;-webkit-font-smoothing:antialiased;min-height:100vh;
  }
  .app{max-width:1640px;margin:0 auto;padding:0 26px 48px}

  /* ============ HEADER ============ */
  header.topo{
    background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 55%,#24467a 100%);
    color:#fff;padding:26px 34px;border-radius:0 0 18px 18px;position:relative;overflow:hidden;
    box-shadow:var(--sh-navy);
  }
  header.topo::before{content:"";position:absolute;left:0;top:0;bottom:0;width:10px;
    background:linear-gradient(180deg,var(--laranja),var(--laranja2));box-shadow:2px 0 12px rgba(248,155,50,.5)}
  header.topo::after{content:"";position:absolute;right:-80px;top:-120px;width:400px;height:400px;
    background:radial-gradient(circle,rgba(53,120,188,.35),transparent 70%);border-radius:50%}
  header.topo .row{display:flex;align-items:center;justify-content:space-between;gap:24px;position:relative;z-index:2}
  header.topo .brand{display:flex;align-items:center;gap:22px}
  .logo-card{background:#fff;border-radius:14px;padding:12px 16px;box-shadow:0 8px 24px rgba(0,0,0,.28);
    display:flex;align-items:center;justify-content:center}
  .logo-card img{height:66px;display:block}
  header.topo h1{font-size:23px;font-weight:800;letter-spacing:.2px;line-height:1.15;
    text-shadow:0 2px 8px rgba(0,0,0,.25)}
  header.topo .sub{font-size:12.5px;color:#C3D0E4;margin-top:6px;font-weight:500}
  header.topo .meta{text-align:right;font-size:11.5px;color:#B8C4D6;position:relative;z-index:2}
  header.topo .meta .lab{text-transform:uppercase;letter-spacing:1px;opacity:.8}
  header.topo .meta .data{font-size:20px;color:#fff;font-weight:800;margin:2px 0;
    text-shadow:0 2px 6px rgba(0,0,0,.3)}
  header.topo .meta .cad{display:inline-block;margin-top:6px;background:rgba(248,155,50,.22);
    border:1px solid rgba(248,155,50,.5);color:var(--laranja2);padding:3px 12px;border-radius:20px;
    font-size:10.5px;font-weight:700;letter-spacing:.5px}
  .fetch-badge{display:inline-flex;align-items:center;gap:6px;margin-top:8px;font-size:10px;
    color:#9FB0CC;font-weight:500}
  .fetch-dot{width:7px;height:7px;border-radius:50%;background:#6b7c99}
  .fetch-dot.ok{background:var(--verde);box-shadow:0 0 8px var(--verde)}
  .fetch-dot.err{background:var(--vermelho);box-shadow:0 0 8px var(--vermelho)}

  /* ============ TABS ============ */
  nav.abas{background:rgba(255,255,255,.85);backdrop-filter:blur(10px);
    border:1px solid var(--cinza-borda);border-radius:14px;display:flex;padding:7px;margin-top:20px;
    box-shadow:var(--sh-md);flex-wrap:wrap;gap:4px;position:sticky;top:12px;z-index:50}
  nav.abas button{background:none;border:none;padding:12px 22px;font-size:13.5px;font-weight:700;
    color:var(--cinza-txt);cursor:pointer;border-radius:10px;transition:all .25s cubic-bezier(.4,0,.2,1);
    font-family:inherit;position:relative}
  nav.abas button:hover{color:var(--navy);background:rgba(53,120,188,.08)}
  nav.abas button.ativa{color:#fff;
    background:linear-gradient(135deg,var(--navy),var(--azul));box-shadow:0 6px 18px rgba(20,42,76,.3)}
  nav.abas button .empresa-tag{display:block;font-size:10px;font-weight:600;opacity:.75;margin-top:1px}
  nav.abas .print-btn{margin-left:auto;
    background:linear-gradient(135deg,var(--laranja),var(--laranja2));color:#fff;border:none;
    padding:10px 20px;border-radius:10px;font-weight:700;cursor:pointer;font-size:12.5px;
    align-self:center;box-shadow:0 6px 18px rgba(248,155,50,.4);transition:transform .2s,box-shadow .2s}
  nav.abas .print-btn:hover{transform:translateY(-2px);box-shadow:0 10px 26px rgba(248,155,50,.55)}
  nav.abas .print-btn:active{transform:translateY(0)}

  /* ============ CONTENT ============ */
  main{margin-top:26px}
  .painel{display:none;animation:fadeUp .5s cubic-bezier(.16,1,.3,1)}
  .painel.ativo{display:block}
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  .stagger>*{animation:fadeUp .5s cubic-bezier(.16,1,.3,1) backwards}
  .stagger>*:nth-child(1){animation-delay:.02s}
  .stagger>*:nth-child(2){animation-delay:.08s}
  .stagger>*:nth-child(3){animation-delay:.14s}
  .stagger>*:nth-child(4){animation-delay:.20s}

  h2.secao{color:var(--navy);font-size:15px;font-weight:800;margin:30px 0 14px;
    display:flex;align-items:center;gap:12px;text-transform:uppercase;letter-spacing:.6px}
  h2.secao::before{content:"";width:5px;height:22px;border-radius:3px;
    background:linear-gradient(180deg,var(--laranja),var(--laranja2));box-shadow:0 2px 8px rgba(248,155,50,.4)}
  h2.secao.azul::before{background:linear-gradient(180deg,var(--azul),var(--azul2))}
  h2.secao.navy::before{background:linear-gradient(180deg,var(--navy),var(--azul))}

  /* ============ KPI CARDS ============ */
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
  .kpi{background:#fff;border-radius:16px;padding:20px 22px;box-shadow:var(--sh-sm);position:relative;
    overflow:hidden;transition:transform .3s cubic-bezier(.16,1,.3,1),box-shadow .3s;
    border:1px solid rgba(225,230,238,.7)}
  .kpi:hover{transform:translateY(-4px);box-shadow:var(--sh-lg)}
  .kpi::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px}
  .kpi::after{content:"";position:absolute;right:-30px;bottom:-30px;width:110px;height:110px;
    border-radius:50%;opacity:.06}
  .kpi.azul::before{background:linear-gradient(180deg,var(--azul),var(--azul2))} .kpi.azul::after{background:var(--azul)}
  .kpi.laranja::before{background:linear-gradient(180deg,var(--laranja),var(--laranja2))} .kpi.laranja::after{background:var(--laranja)}
  .kpi.verde::before{background:var(--verde)} .kpi.verde::after{background:var(--verde)}
  .kpi.vermelho::before{background:var(--vermelho)} .kpi.vermelho::after{background:var(--vermelho)}
  .kpi.navy::before{background:linear-gradient(180deg,var(--navy),var(--azul))} .kpi.navy::after{background:var(--navy)}
  .kpi .rot{font-size:10.5px;color:var(--cinza-txt);text-transform:uppercase;letter-spacing:.8px;font-weight:700;position:relative;z-index:2}
  .kpi .val{font-size:34px;font-weight:800;color:var(--navy);margin-top:6px;line-height:1;position:relative;z-index:2;
    font-variant-numeric:tabular-nums}
  .kpi .val small{font-size:15px;color:var(--cinza-txt);font-weight:600}
  .kpi .sub{font-size:11px;color:var(--cinza-txt);margin-top:8px;position:relative;z-index:2;font-weight:500}

  /* ============ COMP PACOTES ============ */
  .comp-pacotes{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
  .comp-card{background:#fff;border-radius:18px;box-shadow:var(--sh-md);overflow:hidden;
    transition:transform .3s cubic-bezier(.16,1,.3,1),box-shadow .3s;border:1px solid rgba(225,230,238,.6)}
  .comp-card:hover{transform:translateY(-5px);box-shadow:var(--sh-lg)}
  .comp-card .cab{padding:16px 20px;color:#fff;display:flex;justify-content:space-between;align-items:center;position:relative;overflow:hidden}
  .comp-card .cab::after{content:"";position:absolute;right:-40px;top:-40px;width:120px;height:120px;
    background:rgba(255,255,255,.12);border-radius:50%}
  .comp-card .cab .nome{font-weight:800;font-size:17px;position:relative;z-index:2}
  .comp-card .cab .empresa{font-size:11px;opacity:.9;font-weight:600;letter-spacing:.5px;position:relative;z-index:2}
  .comp-card .cab .km{font-size:10px;opacity:.75;margin-top:2px;position:relative;z-index:2}
  .empresa-logo-card{background:#fff;border-radius:10px;padding:7px 10px;box-shadow:0 4px 12px rgba(0,0,0,.22);
    display:flex;align-items:center;justify-content:center;position:relative;z-index:2;flex-shrink:0;height:46px}
  .empresa-logo-card img{height:30px;display:block;max-width:110px;object-fit:contain}

  /* PACKAGE BANNER (topo de cada aba de pacote) */
  .pac-banner{display:flex;align-items:center;gap:20px;padding:18px 26px;border-radius:16px;
    color:#fff;box-shadow:var(--sh-md);position:relative;overflow:hidden;margin-bottom:6px}
  .pac-banner::after{content:"";position:absolute;right:-60px;top:-80px;width:260px;height:260px;
    background:radial-gradient(circle,rgba(255,255,255,.14),transparent 70%);border-radius:50%}
  .pac-banner-logo{background:#fff;border-radius:12px;padding:10px 16px;box-shadow:0 6px 18px rgba(0,0,0,.25);
    display:flex;align-items:center;justify-content:center;position:relative;z-index:2;flex-shrink:0}
  .pac-banner-logo img{height:44px;display:block;max-width:180px;object-fit:contain}
  .pac-banner-txt{position:relative;z-index:2;flex:1}
  .pac-banner-nome{font-size:22px;font-weight:800;letter-spacing:.2px;text-shadow:0 2px 8px rgba(0,0,0,.25)}
  .pac-banner-km{font-size:12px;opacity:.9;margin-top:3px;font-weight:500}
  .pac-banner-fico{position:relative;z-index:2;background:rgba(255,255,255,.95);border-radius:10px;
    padding:8px 12px;box-shadow:0 4px 14px rgba(0,0,0,.2);flex-shrink:0}
  .pac-banner-fico img{height:38px;display:block}
  .comp-card.p1 .cab{background:linear-gradient(135deg,var(--azul),var(--azul2))}
  .comp-card.p2 .cab{background:linear-gradient(135deg,var(--laranja),var(--laranja2))}
  .comp-card.p3 .cab{background:linear-gradient(135deg,var(--navy),#24467a)}
  .comp-card .corpo{padding:18px 20px}
  .comp-card .linha{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--cinza-borda);font-size:13px;align-items:center}
  .comp-card .linha:last-child{border:none}
  .comp-card .linha .lab{color:var(--cinza-txt);font-weight:500}
  .comp-card .linha .num{font-weight:800;color:var(--navy);font-variant-numeric:tabular-nums}
  .comp-card .barra-avanco{background:var(--cinza-borda);height:10px;border-radius:6px;overflow:hidden;margin:12px 0;position:relative}
  .comp-card .barra-avanco .fill{height:100%;border-radius:6px;position:relative;
    background:linear-gradient(90deg,var(--verde),#3fb862);transition:width 1.2s cubic-bezier(.16,1,.3,1)}
  .comp-card .barra-avanco .fill::after{content:"";position:absolute;inset:0;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);
    animation:shimmer 2.5s infinite}
  @keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(200%)}}
  .semaforo{display:inline-flex;align-items:center;gap:6px;padding:5px 13px;border-radius:20px;font-size:11px;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:.4px;position:relative;z-index:2}
  .semaforo::before{content:"";width:8px;height:8px;border-radius:50%;background:#fff;box-shadow:0 0 8px rgba(255,255,255,.9)}
  .sem-verde{background:rgba(46,155,78,.95)}
  .sem-amarelo{background:rgba(244,196,48,.95);color:#5a4a00}
  .sem-amarelo::before{background:#5a4a00}
  .sem-vermelho{background:rgba(209,69,69,.95);animation:pulseRed 2s infinite}
  @keyframes pulseRed{0%,100%{box-shadow:0 0 0 0 rgba(209,69,69,.5)}50%{box-shadow:0 0 0 8px rgba(209,69,69,0)}}

  /* ============ CARDS/GRAFICOS ============ */
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
  .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
  .card{background:#fff;border-radius:16px;padding:20px 22px;box-shadow:var(--sh-sm);
    border:1px solid rgba(225,230,238,.6);transition:box-shadow .3s}
  .card:hover{box-shadow:var(--sh-md)}
  .card h3{color:var(--navy);font-size:12.5px;font-weight:800;margin-bottom:12px;text-transform:uppercase;letter-spacing:.6px;
    display:flex;align-items:center;gap:8px}
  .card h3::before{content:"";width:4px;height:14px;background:var(--laranja);border-radius:2px}
  .grafico{width:100%;height:290px}
  .grafico.alt{height:230px}

  /* ============ EQUIPE ============ */
  .equipe-comp{display:flex;gap:12px;flex-wrap:wrap}
  .eq-pessoa{background:linear-gradient(135deg,#F7F9FC,#EDF1F7);border-radius:14px;padding:16px 18px;flex:1;min-width:110px;text-align:center;
    box-shadow:var(--sh-sm);border:1px solid rgba(225,230,238,.7);transition:transform .3s}
  .eq-pessoa:hover{transform:translateY(-3px)}
  .eq-pessoa .qtd{font-size:30px;font-weight:800;color:var(--navy);line-height:1}
  .eq-pessoa .rot{font-size:10.5px;color:var(--cinza-txt);text-transform:uppercase;letter-spacing:.5px;margin-top:6px;font-weight:700}
  .eq-total{background:linear-gradient(135deg,var(--navy),#24467a)}
  .eq-total .qtd{color:#fff} .eq-total .rot{color:#B8C4D6}

  /* ============ GAP BOX ============ */
  .gap-box{background:#fff;padding:22px 24px;border-radius:16px;box-shadow:var(--sh-md);
    position:relative;overflow:hidden;border:1px solid rgba(225,230,238,.6)}
  .gap-box::before{content:"";position:absolute;left:0;top:0;bottom:0;width:6px;background:var(--laranja)}
  .gap-box.crit::before{background:var(--vermelho)} .gap-box.warn::before{background:var(--amarelo)}
  .gap-flex{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:24px;align-items:center}
  .gap-flex .item{text-align:center}
  .gap-flex .item .num{font-size:32px;font-weight:800;color:var(--navy);line-height:1;font-variant-numeric:tabular-nums}
  .gap-flex .item .rot{font-size:10.5px;color:var(--cinza-txt);text-transform:uppercase;letter-spacing:.6px;margin-top:6px;font-weight:700}

  /* ============ TABELAS ============ */
  table.cenarios{width:100%;border-collapse:separate;border-spacing:0;background:#fff;border-radius:14px;overflow:hidden;box-shadow:var(--sh-sm);border:1px solid rgba(225,230,238,.6)}
  table.cenarios th{background:linear-gradient(135deg,var(--navy),#24467a);color:#fff;padding:13px 15px;text-align:left;font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
  table.cenarios td{padding:12px 15px;border-bottom:1px solid var(--cinza-borda);font-size:13px;font-variant-numeric:tabular-nums}
  table.cenarios tr:last-child td{border-bottom:none}
  table.cenarios tbody tr{transition:background .2s}
  table.cenarios tbody tr:hover{background:#F7FAFD}
  table.cenarios tr.atual{background:linear-gradient(90deg,#FFF6E8,#FFFBF3)}
  table.cenarios tr.atual td{font-weight:700;color:var(--navy)}
  table.cenarios tr.nec{background:linear-gradient(90deg,#E9F6EE,#F3FBF6)}
  table.cenarios tr.nec td{font-weight:700;color:var(--navy)}
  .tag-atual{background:linear-gradient(135deg,var(--laranja),var(--laranja2));color:#fff;padding:3px 10px;border-radius:12px;font-size:10px;font-weight:800;margin-left:8px;white-space:nowrap;box-shadow:0 3px 8px rgba(248,155,50,.35)}
  .tag-nec{background:var(--verde);color:#fff;padding:3px 10px;border-radius:12px;font-size:10px;font-weight:800;margin-left:8px;white-space:nowrap;box-shadow:0 3px 8px rgba(46,155,78,.3)}

  table.tipos{width:100%;border-collapse:separate;border-spacing:0;background:#fff;border-radius:14px;overflow:hidden;box-shadow:var(--sh-sm);border:1px solid rgba(225,230,238,.6)}
  table.tipos th{background:#F7F9FC;color:var(--navy);padding:11px 14px;text-align:left;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;border-bottom:2px solid var(--laranja)}
  table.tipos td{padding:11px 14px;border-bottom:1px solid var(--cinza-borda);font-size:12.5px}
  table.tipos tbody tr{transition:background .2s}
  table.tipos tbody tr:hover{background:#F7FAFD}
  table.tipos td.num{text-align:right;font-variant-numeric:tabular-nums;font-weight:600}
  table.tipos tr.total-row td{background:linear-gradient(135deg,var(--navy),#24467a);color:#fff;font-weight:800;border:none}
  table.tipos .obs{color:var(--cinza-txt);font-size:11px;font-style:italic}
  table.tipos .marco{color:var(--vermelho);font-weight:800;font-size:10.5px;background:rgba(209,69,69,.1);padding:2px 8px;border-radius:8px}

  /* ============ ALERTAS ============ */
  .alertas{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:14px}
  .alerta{background:#fff;padding:16px 18px;border-radius:14px;box-shadow:var(--sh-sm);position:relative;overflow:hidden;
    border:1px solid rgba(225,230,238,.6);transition:transform .3s,box-shadow .3s}
  .alerta:hover{transform:translateY(-3px);box-shadow:var(--sh-md)}
  .alerta::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px}
  .alerta.crit::before{background:var(--vermelho)}
  .alerta.aviso::before{background:var(--amarelo)}
  .alerta.info::before{background:var(--azul)}
  .alerta .tit{font-weight:800;color:var(--navy);font-size:13px;margin-bottom:6px;display:flex;align-items:center;gap:8px}
  .alerta .txt{font-size:12px;color:var(--cinza-txt);line-height:1.6}
  .alerta .ico{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;font-size:12px;font-weight:900;color:#fff;flex-shrink:0}
  .alerta.crit .ico{background:var(--vermelho)}
  .alerta.aviso .ico{background:var(--amarelo);color:#5a4a00}
  .alerta.info .ico{background:var(--azul)}

  .timeline-wrap{background:#fff;padding:24px;border-radius:16px;box-shadow:var(--sh-md);border:1px solid rgba(225,230,238,.6)}

  /* ============ FOOTER ============ */
  footer{margin-top:38px;padding:22px 28px;
    background:linear-gradient(135deg,var(--navy),#24467a);color:#B8C4D6;border-radius:18px;font-size:11.5px;
    display:flex;justify-content:space-between;flex-wrap:wrap;gap:16px;box-shadow:var(--sh-navy);position:relative;overflow:hidden}
  footer::before{content:"";position:absolute;left:0;top:0;bottom:0;width:8px;background:linear-gradient(180deg,var(--laranja),var(--laranja2))}
  footer .premissa{max-width:640px;line-height:1.6}
  footer strong{color:#fff}
  footer .right{text-align:right;line-height:1.7}

  /* ============ PRINT ============ */
  @media print{
    @page{size:A3 landscape;margin:8mm}
    html,body{background:#fff}
    .app{max-width:100%;padding:0}
    nav.abas{display:none !important}
    header.topo{border-radius:0;box-shadow:none;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .painel{display:none !important}
    .painel.ativo{display:block !important;animation:none}
    .kpi,.card,.comp-card,.gap-box,.alerta,.timeline-wrap,table.cenarios,table.tipos,footer{
      box-shadow:none !important;border:1px solid var(--cinza-borda);break-inside:avoid;
      -webkit-print-color-adjust:exact;print-color-adjust:exact}
    *{-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important}
    .grafico{height:250px}
    .barra-avanco .fill::after{display:none}
  }
  @media (max-width:1200px){
    .kpis{grid-template-columns:repeat(2,1fr)}
    .comp-pacotes{grid-template-columns:1fr}
    .grid-2,.grid-3{grid-template-columns:1fr}
    .gap-flex{grid-template-columns:1fr 1fr}
  }
</style>
</head>
<body>
<div class="app">

<header class="topo">

    let pac,tipo,tot,exe,obs;
    if(Array.isArray(row)){pac=row[0];tipo=row[2];tot=row[3];exe=row[4];obs=row[5];}
    else{pac=row.PACOTE;tipo=row.TIPO;tot=row.TOTAL;exe=row.EXECUTADO;obs=row.OBSERVACAO;}
    const k=KEY(pac); if(!P[k])return;
    const t=+tot||0,e=+exe||0;
    P[k].tipos.push({tipo,total:t,exec:e,pend:t-e,obs:obs||''});
    P[k].total+=t; P[k].exec+=e;
  });
  Object.values(P).forEach(p=>p.pend=p.total-p.exec);
  raw.cenarios.forEach(row=>{
    let pac,neq,ps,pd,col,atual,nec,nota;
    if(Array.isArray(row)){pac=row[0];neq=row[1];ps=row[2];pd=row[3];col=row[4];atual=row[5];nec=row[6];nota=row[7];}
    else{pac=row.PACOTE;neq=row.N_EQUIPES;ps=row.PEND_SEMANA;pd=row.PEND_DIA;col=row.COLABORADORES;atual=row.ATUAL;nec=row.NECESSARIO;nota=row.NOTA;}
    const k=KEY(pac); if(!P[k])return;
    P[k].cenarios.push({neq:+neq,ps:esc(ps),pd:esc(pd),col:+col,
      atual:String(atual||'').trim().toUpperCase()==='SIM',
      nec:String(nec||'').trim().toUpperCase()==='SIM',nota:esc(nota)});
  });
  const AL={geral:[],p1:[],p2:[],p3:[]};
  raw.alertas.forEach(row=>{
    let pac,tp,tit,txt;
    if(Array.isArray(row)){pac=row[0];tp=row[1];tit=row[2];txt=row[3];}
    else{pac=row.PACOTE;tp=row.TIPO;tit=row.TITULO;txt=row.TEXTO;}
    const key=String(pac).trim().toUpperCase()==='GERAL'?'geral':KEY(pac);
    if(!AL[key])return;
    AL[key].push({tp:String(tp).trim().toUpperCase(),tit:esc(tit),txt:esc(txt)});
  });
  return {meta:raw.meta,P,AL};
}

function alertasHTML(lista){

function renderConsolidado(){

  const tot=ks.reduce((s,k)=>s+P[k].total,0), exe=ks.reduce((s,k)=>s+P[k].exec,0), pen=tot-exe;

    +'<div class="kpis stagger">'
    +'<div class="kpi navy"><div class="rot">Pend\u00eancias totais</div><div class="val">'+tot.toLocaleString('pt-BR')+'</div><div class="sub">Base inicial de escopo</div></div>'
    +'<div class="kpi verde"><div class="rot">Executadas</div><div class="val">'+exe+'</div><div class="sub">'+pctE+'% do escopo</div></div>'
    +'<div class="kpi laranja"><div class="rot">Pend\u00eancias restantes</div><div class="val">'+pen.toLocaleString('pt-BR')+'</div><div class="sub">A tratar at\u00e9 o marco final</div></div>'
    +'<div class="kpi vermelho"><div class="rot">Efetivo mobilizado</div><div class="val">'+mob+' <small>/ '+nec+' nec.</small></div><div class="sub">Gap de '+(nec-mob)+' colaboradores ('+gapC+'%)</div></div>'
    +'</div><h2 class="secao">Comparativo por pacote</h2><div class="comp-pacotes stagger">';
  ks.forEach(k=>{
    const p=P[k], pctp=p.total?Math.round(p.exec/p.total*100):0, st=statusFromGap(p.gap);
    const mobTxt=p.gap<=0?(p.mob+' col.'):(p.mob+' / '+p.nec+' nec.');

    h+='<div class="comp-card '+k+'">'
      +'<div class="cab"><div style="display:flex;align-items:center;gap:14px">'+logo+'<div><div class="nome">Pacote 0'+k[1]+'</div><div class="empresa">'+p.empresa+'</div><div class="km">'+p.km+'</div></div></div><span class="semaforo sem-'+st.cls+'">'+st.lbl+'</span></div>'
      +'<div class="corpo">'
      +'<div class="linha"><span class="lab">Total</span><span class="num">'+p.total+'</span></div>'
      +'<div class="linha"><span class="lab">Executadas</span><span class="num">'+p.exec+' ('+pctp+'%)</span></div>'
      +'<div class="linha"><span class="lab">Restantes</span><span class="num" style="color:var(--vermelho)">'+p.pend+'</span></div>'
      +'<div class="barra-avanco"><div class="fill" style="width:'+pctp+'%;background:'+fillGrad(st.cls)+'"></div></div>'
      +'<div class="linha"><span class="lab">Equipe mobilizada</span><span class="num">'+mobTxt+'</span></div>'
      +'<div class="linha"><span class="lab">RNCs em campo</span><span class="num">'+p.rnc+'</span></div>'
      +'<div class="linha"><span class="lab">'+p.extra_label+'</span><span class="num" style="color:'+extraCor+'">'+p.extra_value+'</span></div>'
      +'</div></div>';
  });
  h+='</div><h2 class="secao">Gr\u00e1ficos consolidados</h2><div class="grid-2">'
    +'<div class="card"><h3>Executado \u00d7 Pendente por pacote</h3><div id="g_cs" class="grafico"></div></div>'

    +'<h2 class="secao">Alertas gerais</h2>'+alertasHTML(D.AL.geral);

function renderPacote(k){
  const p=D.P[k]; if(!p){document.getElementById(k).innerHTML='';return;}
  const scls=CORCLS[k], pctp=p.total?Math.round(p.exec/p.total*100):0, st=statusFromGap(p.gap);
  const grad={p1:'linear-gradient(135deg,var(--azul),var(--azul2))',p2:'linear-gradient(135deg,var(--laranja),var(--laranja2))',p3:'linear-gradient(135deg,var(--navy),#24467a)'}[k];
  const logo=LOGOS[p.empresa]?'<div class="pac-banner-logo"><img src="data:image/png;base64,'+LOGOS[p.empresa]+'" alt="'+p.empresa+'"></div>':'';
  const mobVal=p.gap<=0?(''+p.mob):(p.mob+' <small>/ '+p.nec+'</small>');
  const gapSub=p.gap<=0?'Mobiliza\u00e7\u00e3o OK':('Gap de '+p.gap+'% \u00b7 '+p.status_txt);
  let h='<div class="pac-banner" style="background:'+grad+'">'+logo
    +'<div class="pac-banner-txt"><div class="pac-banner-nome">Pacote 0'+k[1]+' \u2014 '+p.empresa+'</div><div class="pac-banner-km">'+p.km+' \u00b7 '+p.cronograma+'</div></div>'
    +'<div class="pac-banner-fico"><img src="data:image/png;base64,'+LOGO_FICO+'" alt="FICO"></div></div>'
    +'<div class="kpis stagger">'
    +'<div class="kpi navy"><div class="rot">Total</div><div class="val">'+p.total+'</div><div class="sub">Pend\u00eancias mapeadas</div></div>'
    +'<div class="kpi verde"><div class="rot">Executadas</div><div class="val">'+p.exec+'</div><div class="sub">'+pctp+'% de avan\u00e7o</div></div>'
    +'<div class="kpi vermelho"><div class="rot">Restantes</div><div class="val">'+p.pend+'</div><div class="sub">A tratar at\u00e9 o marco</div></div>'
    +'<div class="kpi laranja"><div class="rot">Efetivo mobilizado</div><div class="val">'+mobVal+'</div><div class="sub">'+gapSub+'</div></div>'
    +'</div><div class="grid-2">'
    +'<div class="card"><h3>Executado \u00d7 Pendente por tipo</h3><div id="g_'+k+'t" class="grafico"></div></div>'
    +'<div class="card"><h3>Composi\u00e7\u00e3o da execu\u00e7\u00e3o</h3><div id="g_'+k+'d" class="grafico"></div></div></div>'
    +'<h2 class="secao '+scls+'">Detalhamento por tipo</h2>'
    +'<table class="tipos"><thead><tr><th>Tipo</th><th class="num">Total</th><th class="num">Executado</th><th class="num">Pendente</th><th>Observa\u00e7\u00e3o</th></tr></thead><tbody>';
  p.tipos.forEach(t=>{
    const obs=/MARCO/i.test(t.obs)?'<span class="marco">'+t.obs+'</span>':(t.obs?'<span class="obs">'+t.obs+'</span>':'');
    h+='<tr><td>'+t.tipo+'</td><td class="num">'+t.total+'</td><td class="num">'+t.exec+'</td><td class="num">'+t.pend+'</td><td>'+obs+'</td></tr>';
  });
  h+='<tr class="total-row"><td>TOTAL</td><td class="num">'+p.total+'</td><td class="num">'+p.exec+'</td><td class="num">'+p.pend+'</td><td></td></tr></tbody></table>';

  h+='<h2 class="secao '+scls+'">Composi\u00e7\u00e3o da equipe</h2><div class="equipe-comp">';
  if(p.enc>0)h+='<div class="eq-pessoa"><div class="qtd">'+p.enc+'</div><div class="rot">'+(p.enc>1?'Encarregados':'Encarregado')+'</div></div>';
  if(p.ofi>0)h+='<div class="eq-pessoa"><div class="qtd">'+p.ofi+'</div><div class="rot">'+(p.ofi>1?'Oficiais':'Oficial')+'</div></div>';

  if(p.gap>0)h+='<div class="eq-pessoa" style="background:#FDE8E8;border:2px dashed var(--vermelho)"><div class="qtd" style="color:var(--vermelho)">'+p.nec+'</div><div class="rot" style="color:var(--vermelho)">Necess\u00e1rio</div></div>';
  h+='</div>';

  const gapcls=p.gap<=0?'':(st.cls==='vermelho'?'crit':'warn');

  h+='</div>';

  p.cenarios.forEach(c=>{
    const both=c.atual&&c.nec;
    let rowcls='',tags='',lbl;
    if(both){rowcls=' class="atual"';tags=' <span class="tag-atual">ATUAL</span> <span class="tag-nec">NECESS\u00c1RIO</span>';lbl=c.neq+' equipe (12 col.)';}
    else if(c.atual){rowcls=' class="atual"';tags=' <span class="tag-atual">ATUAL '+p.mob+' col.</span>';lbl=c.neq+' equipes (mob. atual)';}
    else if(c.nec){rowcls=' class="nec"';tags=' <span class="tag-nec">NECESS\u00c1RIO</span>';lbl=c.neq+' equipes';}
    else{lbl=c.neq===1?(c.neq+' equipe'):(c.neq+' equipes');}
    const semZerar=both?'12':(num(c.ps)>0?String(Math.round(p.pend/num(c.ps)*10)/10).replace('.',','):'\u2014');

  });
  h+='</tbody></table>'
    +'<div style="font-size:11px;color:var(--cinza-txt);margin-top:8px;font-style:italic">Premissa: 1 equipe com 12 colaboradores executa 2 pend\u00eancias/dia (hist\u00f3rico EMPA). "Semanas p/ zerar" calculado sobre o volume total pendente ('+p.pend+').</div>'
    +'<h2 class="secao '+scls+'">Alertas do pacote</h2>'+alertasHTML(D.AL[k]);
  document.getElementById(k).innerHTML=h;
}

function initChart(id){const el=document.getElementById(id);if(!el)return null;if(charts[id])charts[id].dispose();charts[id]=echarts.init(el);return charts[id];}
function baseGrid(){return{left:'9%',right:'5%',top:'12%',bottom:'20%'};}
function renderCharts(){
  const P=D.P, ks=['p1','p2','p3'].filter(k=>P[k]);
  const cs=initChart('g_cs');
  if(cs)cs.setOption({tooltip:{trigger:'axis',axisPointer:{type:'shadow'}},legend:{data:['Executado','Pendente'],bottom:0,textStyle:{fontSize:11}},grid:baseGrid(),
    xAxis:{type:'category',data:ks.map(k=>'Pacote 0'+k[1]+' \u00b7 '+P[k].empresa),axisLabel:{fontSize:10,color:CORES.navy}},
    yAxis:{type:'value',axisLabel:{fontSize:10,color:'#8898B0'},splitLine:{lineStyle:{color:'#EEF'}}},
    series:[{name:'Executado',type:'bar',stack:'t',color:CORES.verde,barWidth:'50%',label:{show:true,position:'inside',color:'#fff',fontSize:11,fontWeight:'bold'},data:ks.map(k=>P[k].exec)},
      {name:'Pendente',type:'bar',stack:'t',color:CORES.laranja,barWidth:'50%',itemStyle:{borderRadius:[6,6,0,0]},label:{show:true,position:'inside',color:'#fff',fontSize:11,fontWeight:'bold'},data:ks.map(k=>P[k].pend)}]});
  const ce=initChart('g_ce');
  if(ce)ce.setOption({tooltip:{trigger:'axis'},legend:{data:['Mobilizado','Necess\u00e1rio'],bottom:0,textStyle:{fontSize:11}},grid:baseGrid(),
    xAxis:{type:'category',data:ks.map(k=>P[k].empresa),axisLabel:{fontSize:11,color:CORES.navy}},
    yAxis:{type:'value',axisLabel:{fontSize:10,color:'#8898B0'},splitLine:{lineStyle:{color:'#EEF'}}},
    series:[{name:'Mobilizado',type:'bar',color:CORES.azul,barWidth:'32%',itemStyle:{borderRadius:[6,6,0,0]},label:{show:true,position:'top',fontSize:11,color:CORES.navy,fontWeight:'bold'},data:ks.map(k=>P[k].mob)},
      {name:'Necess\u00e1rio',type:'bar',color:CORES.laranja,barWidth:'32%',itemStyle:{borderRadius:[6,6,0,0]},label:{show:true,position:'top',fontSize:11,color:CORES.navy,fontWeight:'bold'},data:ks.map(k=>P[k].nec)}]});
  const sem=['S1 Jul','S2 Jul','S3 Jul','S4 Jul','S1 Ago','S2 Ago','S3 Ago','S4 Ago','S1 Set','S2 Set','S3 Set','S4 Set','Marco'];
  const acc=(rate,start)=>{let a=[],v=0;for(let i=0;i<13;i++){if(i>=start)v+=rate;a.push(i<start?0:Math.round(v*10)/10);}a[12]=a[11];return a;};
  const corK={p1:CORES.azul,p2:CORES.laranja,p3:CORES.verde};
  const series=ks.map((k,idx)=>{
    const cenAtual=P[k].cenarios.find(c=>c.atual)||P[k].cenarios[0]||{ps:'0'};
    const s={name:'Pacote 0'+k[1]+' \u00b7 '+P[k].empresa,type:'line',color:corK[k],smooth:true,symbol:'circle',symbolSize:6,lineStyle:{width:3},areaStyle:{opacity:.08},data:acc(num(cenAtual.ps),P[k].start)};
    if(idx===ks.length-1)s.markLine={silent:true,symbol:'none',lineStyle:{color:CORES.vermelho,type:'dashed',width:2},label:{formatter:'Marco final',color:CORES.vermelho,fontSize:11,fontWeight:'bold'},data:[{xAxis:'Marco'}]};
    return s;
  });
  const tl=initChart('g_tl');
  if(tl)tl.setOption({tooltip:{trigger:'axis'},legend:{data:series.map(s=>s.name),bottom:0,textStyle:{fontSize:11}},grid:{left:'6%',right:'8%',top:'12%',bottom:'20%'},
    xAxis:{type:'category',data:sem,axisLabel:{fontSize:10,color:CORES.navy}},
    yAxis:{type:'value',name:'Pend\u00eancias executadas (acum.)',nameTextStyle:{fontSize:10,color:CORES.navy},axisLabel:{fontSize:10,color:'#8898B0'},splitLine:{lineStyle:{color:'#EEF'}}},series});
  ks.forEach(k=>{
    const p=P[k];

    if(t)t.setOption({tooltip:{trigger:'axis',axisPointer:{type:'shadow'}},legend:{data:['Executado','Pendente'],bottom:0,textStyle:{fontSize:11}},grid:baseGrid(),

      yAxis:{type:'value',axisLabel:{fontSize:10,color:'#8898B0'},splitLine:{lineStyle:{color:'#EEF'}}},
      series:[{name:'Executado',type:'bar',stack:'t',color:CORES.verde,barWidth:'55%',label:{show:true,position:'inside',color:'#fff',fontSize:10,fontWeight:'bold',formatter:x=>x.value>0?x.value:''},data:p.tipos.map(x=>x.exec)},
        {name:'Pendente',type:'bar',stack:'t',color:CORES.laranja,barWidth:'55%',itemStyle:{borderRadius:[5,5,0,0]},label:{show:true,position:'inside',color:'#fff',fontSize:10,fontWeight:'bold',formatter:x=>x.value>0?x.value:''},data:p.tipos.map(x=>x.pend)}]});
    const d=initChart('g_'+k+'d');

    if(d)d.setOption({tooltip:{trigger:'item',formatter:'{b}: {c} ({d}%)'},legend:{bottom:0,textStyle:{fontSize:11}},

        label:{show:true,position:'center',formatter:pct+'%\navan\u00e7o',fontSize:18,fontWeight:'bold',color:CORES.navy,lineHeight:22},
        data:[{value:p.exec,name:'Executado',itemStyle:{color:CORES.verde}},{value:p.pend,name:'Pendente',itemStyle:{color:CORES.laranja}}]}]});
  });
}

function renderAll(){renderChrome();renderConsolidado();['p1','p2','p3'].forEach(renderPacote);renderCharts();}

function mostrar(id,btn){
  document.querySelectorAll('.painel').forEach(p=>p.classList.remove('ativo'));
  document.getElementById(id).classList.add('ativo');
  document.querySelectorAll('nav.abas button:not(.print-btn)').forEach(b=>b.classList.remove('ativa'));
  btn.classList.add('ativa');
  setTimeout(()=>Object.values(charts).forEach(c=>c&&c.resize()),60);
}

function parseWorkbook(wb){
  const S=n=>wb.Sheets[n]?XLSX.utils.sheet_to_json(wb.Sheets[n]):[];
  const meta={}; S('META').forEach(r=>{if(r.CHAVE)meta[r.CHAVE]=r.VALOR;});
  const pacotes=S('PACOTES'), pendencias=S('PENDENCIAS'), cenarios=S('CENARIOS'), alertas=S('ALERTAS');
  if(!pacotes.length||!pendencias.length)throw new Error('abas essenciais ausentes');
  return normalizar({meta:Object.keys(meta).length?meta:FALLBACK.meta,pacotes,pendencias,cenarios,alertas});
}

async function tentarFetch(){
  const dot=document.getElementById('fetchDot'), st=document.getElementById('fetchStatus');
  if(!CONFIG.XLSX_URL){dot.className='fetch-dot';st.textContent='dados locais';return;}
  try{
    const r=await fetch(CONFIG.XLSX_URL+(CONFIG.XLSX_URL.includes('?')?'&':'?')+'t='+Date.now());
    if(!r.ok)throw new Error('HTTP '+r.status);
    D=parseWorkbook(XLSX.read(await r.arrayBuffer(),{type:'array'}));
    renderAll();
    dot.className='fetch-dot ok';st.textContent='sincronizado \u00b7 GitHub';
  }catch(e){console.warn('Fetch falhou, usando fallback:',e);dot.className='fetch-dot err';st.textContent='offline \u00b7 dados locais';}
}

D=normalizar(FALLBACK);
renderAll();
tentarFetch();
window.addEventListener('resize',()=>Object.values(charts).forEach(c=>c&&c.resize()));
window.addEventListener('beforeprint',()=>setTimeout(()=>Object.values(charts).forEach(c=>c&&c.resize()),100));
